# themed kitty configuration & keybindings

# font
font_family      Caskaydia Mono Nerd Font
bold_font        Caskaydia Mono Nerd Font Bold
italic_font      Caskaydia Mono Nerd Font Italic
bold_italic_font Caskaydia Mono Nerd Font Bold Italic
font_size        12.0

# font ligatures
font_features JetBrainsMono-Regular +liga +calt
font_features JetBrainsMono-Bold    +liga +calt

# cursor
cursor                #f5c2e7
cursor_text_color     #1e1e2e
cursor_shape          beam
cursor_beam_thickness 1.8
cursor_blink_interval 0
cursor_stop_blinking_after 0

# scrollback
scrollback_lines 10000

# mouse
mouse_hide_wait 2.0
click_interval  0.5
focus_follows_mouse no

# performance
repaint_delay    8
input_delay      3
sync_to_monitor  yes

# bell
enable_audio_bell no
visual_bell_duration 0.0

# window
remember_window_size   no
initial_window_width   120c
initial_window_height  34c

window_padding_width   14
window_padding_height  10

hide_window_decorations no
confirm_os_window_close 0

# Background opacity + blur
background_opacity      0.92
background_blur         24
dynamic_background_opacity no

# tab bar
tab_bar_edge            bottom
tab_bar_style           powerline
tab_powerline_style     slanted
tab_bar_min_tabs        1
tab_bar_margin_width    0
tab_bar_margin_height   4 4

tab_title_template      " {index}: {title} "
active_tab_title_template " {index}: {title} "

active_tab_font_style   bold
inactive_tab_font_style normal

active_tab_foreground   #1e1e2e
active_tab_background   #89b4fa
inactive_tab_foreground #a6adc8
inactive_tab_background #313244
tab_bar_background      #181825
tab_bar_margin_color    #181825

# color scheme
foreground              #cdd6f4
background              #1e1e2e
selection_foreground    #1e1e2e
selection_background    #f5c2e7

# Black
color0  #45475a
color8  #585b70

# Red
color1  #f38ba8
color9  #f38ba8

# Green
color2  #a6e3a1
color10 #a6e3a1

# Yellow
color3  #f9e2af
color11 #f9e2af

# Blue
color4  #89b4fa
color12 #89b4fa

# Magenta
color5  #f5c2e7
color13 #cba6f7

# Cyan
color6  #94e2d5
color14 #89dceb

# White
color7  #bac2de
color15 #a6adc8

# Marks
mark1_foreground #1e1e2e
mark1_background #b4befe
mark2_foreground #1e1e2e
mark2_background #cba6f7
mark3_foreground #1e1e2e
mark3_background #74c7ec

# URL
url_color               #89b4fa
url_style               curly
open_url_with           default
detect_urls             yes

# keybindings

# clear defaults
clear_all_shortcuts no

# clipboard
map super+c        copy_to_clipboard
map super+v        paste_from_clipboard
map super+с        copy_to_clipboard
map super+м        paste_from_clipboard

# scrolling
map ctrl+shift+k        scroll_line_up
map ctrl+shift+j        scroll_line_down
map ctrl+shift+page_up  scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home     scroll_home
map ctrl+shift+end      scroll_end

# font size
map ctrl+equal          change_font_size all +1.0
map ctrl+minus          change_font_size all -1.0
map ctrl+0              change_font_size all 0

# tabs
map super+t        new_tab_with_cwd
map super+w        close_tab
map super+alt+right    next_tab
map super+alt+left     previous_tab
map super+alt+l        next_tab
map super+alt+h        previous_tab

# windows / splits
map ctrl+shift+enter    new_window_with_cwd
map ctrl+shift+]        next_window
map ctrl+shift+[        previous_window

# misc
map ctrl+shift+r        load_config_file
map ctrl+shift+f        show_scrollback

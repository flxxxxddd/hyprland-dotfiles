# hyprlock configuration

general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
    no_fade_in = false
    no_fade_out = false
    ignore_empty_input = true
}

# background
background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    noise = 0.05
    brightness = 0.65
    vibrancy = 0.15
    vibrancy_darkness = 0.2
}

# centered clock. time — HH:MM AM/PM
label {
    monitor =
    text = cmd[update:1000] date +"%I:%M %p"
    color = rgba(205, 214, 244, 1.0)
    font_size = 72
    font_family = Caskaydia Mono Nerd Font Medium
    position = 0, 160
    halign = center
    valign = center
}

# date like — Wednesday, March 18
label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    color = rgba(166, 173, 200, 0.85)
    font_size = 15
    font_family = Caskaydia Mono Nerd Font
    position = 0, 90
    halign = center
    valign = center
}

# login card
shape {
    monitor =
    size = 320, 160
    color = rgba(30, 30, 46, 0.85)
    rounding = 18
    border_size = 1
    border_color = rgba(69, 71, 90, 0.9)
    position = 0, -60
    halign = center
    valign = center
}

# username
label {
    monitor =
    text =  $USER
    color = rgba(205, 214, 244, 0.9)
    font_size = 14
    font_family = Caskaydia Mono Nerd Font SemiBold
    position = 0, -20
    halign = center
    valign = center
}

# input field
input-field {
    monitor =
    size = 270, 42
    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.35
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(137, 180, 250, 0.0)
    inner_color = rgba(49, 50, 68, 1.0)
    font_color = rgba(205, 214, 244, 1.0)
    fade_on_empty = false
    fade_timeout = 2000
    placeholder_text = <span foreground="##6c7086">󰌾  password</span>
    rounding = 10
    check_color = rgba(166, 227, 161, 1.0)
    fail_color = rgba(243, 139, 168, 1.0)
    fail_text = <span foreground="##f38ba8">󰅙  wrong password</span>
    fail_transition = 300
    capslock_color = rgba(249, 226, 175, 1.0)
    position = 0, -78
    halign = center
    valign = center
}

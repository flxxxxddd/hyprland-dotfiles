# ── Memory ───────────────────────────────────────────────────
mem_graphs = True
mem_below_net = False
zfs_arc_cached = True
show_swap = True
swap_disk = True
show_disks = True
only_physical = True
use_fstab = False
zfs_hide_datasets = False
disk_free_prct = False
io_mode = False
io_graph_combined = False
io_rx_r = 1
io_tx_r = 1

# ── Network ──────────────────────────────────────────────────
net_download = 100
net_upload = 100
net_auto = True
net_sync = False
net_iface = ""

# ── Process ──────────────────────────────────────────────────
# Sort by: "pid" "program" "arguments" "threads" "user" "memory" "cpu lazy" "cpu responsive"
proc_sorting = "cpu lazy"
proc_reversed = False
proc_tree = False
proc_colors = True
proc_gradient = True
proc_per_core = True
proc_mem_bytes = True
proc_cpu_graphs = True
